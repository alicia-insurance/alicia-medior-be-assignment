services:
  django_server:
    container_name: django_server
    build: .
    command: ["gunicorn", "project.wsgi:application", "--bind", "0.0.0.0:8000", "--workers=3"]
    volumes:
      - ./src:/app
      - static_volume:/app/staticfiles
      - /var/run/docker.sock:/var/run/docker.sock  # Mount Docker socket
    restart: always
    env_file:
      - .env
    networks:
      django-network:
        ipv4_address: 172.22.0.10  # Assigned IP address for server
    depends_on:
      db:
        condition: service_healthy
        restart: true
      redis:
        condition: service_healthy
        restart: true

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/app/staticfiles
    depends_on:
      - django_server
    restart: always
    networks:
      django-network:
        ipv4_address: 172.22.0.13

  db:
    container_name: django_db
    image: postgres:latest
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dev_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-dev_db}
    ports:
      - "5432:5432"
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      django-network:
        ipv4_address: 172.22.0.11  # Assigned IP address for db

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 3
    restart: always
    networks:
      django-network:
        ipv4_address: 172.22.0.12  # Assigned IP address for redis

volumes:
  db-data:
  static_volume:

networks:
  django-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.22.0.0/16